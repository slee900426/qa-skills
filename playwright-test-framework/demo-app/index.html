<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Demo Login</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #f4f5f7;
      }
      main {
        width: min(360px, 90vw);
        padding: 2rem;
        background: #fff;
        border-radius: 12px;
        box-shadow: 0 8px 30px rgba(0, 0, 0, 0.08);
      }
      h1 {
        margin: 0 0 1.25rem;
        font-size: 1.4rem;
        text-align: center;
      }
      form {
        display: grid;
        gap: 0.75rem;
      }
      input {
        padding: 0.65rem 0.75rem;
        border: 1px solid #c9ced6;
        border-radius: 8px;
        font-size: 1rem;
      }
      button {
        padding: 0.65rem 0.75rem;
        border: 0;
        border-radius: 8px;
        background: #2f6feb;
        color: #fff;
        font-size: 1rem;
        cursor: pointer;
      }
      button:hover {
        background: #2257c4;
      }
      .error {
        margin: 1rem 0 0;
        color: #c0392b;
        font-weight: 600;
      }
      .welcome {
        margin: 1rem 0 0;
        color: #1e7a46;
        font-weight: 600;
        text-align: center;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Demo App</h1>
      <form id="login-form" data-test="login-form" novalidate>
        <input
          id="username"
          data-test="username"
          name="username"
          type="text"
          placeholder="Username"
          autocomplete="username"
        />
        <input
          id="password"
          data-test="password"
          name="password"
          type="password"
          placeholder="Password"
          autocomplete="current-password"
        />
        <button id="login-button" data-test="login-button" type="submit">Login</button>
      </form>
      <p id="error-message" data-test="error-message" class="error" hidden></p>
      <section id="welcome-message" data-test="welcome-message" class="welcome" hidden></section>
    </main>

    <script>
      // Self-contained credentials for the demo (no backend).
      const VALID_USERNAME = 'admin';
      const VALID_PASSWORD = 'admin123';

      const form = document.getElementById('login-form');
      const errorEl = document.getElementById('error-message');
      const welcomeEl = document.getElementById('welcome-message');

      form.addEventListener('submit', (event) => {
        event.preventDefault();
        const username = document.getElementById('username').value.trim();
        const password = document.getElementById('password').value;

        if (username === VALID_USERNAME && password === VALID_PASSWORD) {
          welcomeEl.textContent = 'Welcome, ' + username + '!';
          welcomeEl.hidden = false;
          errorEl.hidden = true;
          form.hidden = true;
        } else {
          errorEl.textContent = 'Invalid username or password';
          errorEl.hidden = false;
          welcomeEl.hidden = true;
        }
      });
    </script>
  </body>
</html>
