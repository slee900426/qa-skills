name: Playwright Tests

# NOTE: GitHub Actions only runs workflows located in the repository-root
# `.github/workflows/` directory. This file is active when the framework is used
# as a standalone template repo. If the folder is vendored as a sub-directory of
# another repo, promote/copy this file to that repo's root to enable CI.

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    name: Run Playwright (chromium / firefox / webkit)
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Type check
        run: npx tsc --noEmit

      - name: Run Playwright tests
        run: npm test

      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30
